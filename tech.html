<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextage — Project Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="css/styles.css" rel="stylesheet" />
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div id="header"></div>
<section class="tech-section" id="tech">

  <div class="tech-grid reveal">
    <div class="tech-group">
      <div class="tech-group-label">Backend</div>
      <div class="tech-item"><span class="tech-dot"></span>Java 21 (LTS)</div>
      <div class="tech-item"><span class="tech-dot"></span>Spring Boot 3.5.0</div>

      <div class="tech-item"><span class="tech-dot"></span>Lombok</div>
    </div>
    <div class="tech-group">
      <div class="tech-group-label">Frontend</div>
      <div class="tech-item"><span class="tech-dot"></span>Thymeleaf + Layout Dialect</div>
      <div class="tech-item"><span class="tech-dot"></span>HTML5 / CSS3</div>

<script src="js/scripts.js"></script>
